<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Document</title>
</head>

<body>
    <!-- navigation bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Goaltalent</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item fs-4">
                        <a class="nav-link active" aria-current="page" href="{{url_for('home')}}">Home</a>
                    </li>
                    <li class="nav-item fs-4">
                        <a class="nav-link" href="{{url_for('talents')}}">Talents</a>
                    </li>

                    <li class="nav-item fs-4 cta">
                        <a class="nav-link" href="{{url_for('register')}}">Sign Up</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <div class="container">
    
        <h1>the Player videos</h1>
        <ul>
            {% for tallent in tallents %}
            <li class="list-group-item mb-4">

                <div class="d-flex">
                    <div class="profile-image">

                        <a href="{{ url_for('profile', email=tallent.user.email, mode='view') }}">
                            <img src=" {{ url_for('static', filename='imgs/profile-picture.png') }}">
                        </a>


                    </div>

                    <div>
                        <h4>Full name :{{ tallent.full_name }}</h4>
                        <h4>Player position:{{ tallent.user.position}}</h4>
                     

                    </div>

                </div>

                    {% for video in tallent.videos %}
                <p class="mt-2">{{ video.timestamp }}</p>
                <div class="ratio ratio-16x9">
                    <iframe src="{{ video.video_url }}" title="YouTube video player" frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen>
                    </iframe>
                    {% endfor %}
                </div>


            </li>
            <hr style="border: 2px solid white; width: 100%;">
            {% endfor %}
        </ul>

    </div>

</body>

</html>
